# =============================================================================
# ARGO ROLLOUT - version-api
# =============================================================================
# Demo application for showcasing canary deployments
# Uses http-echo for simplicity - just change the version message to upgrade
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: version-api
  labels:
    app.kubernetes.io/name: version-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: backend
    app.kubernetes.io/managed-by: argocd
    fasti.sh/template: demo
  annotations:
    backstage.io/kubernetes-id: version-api
    notifications.argoproj.io/subscribe.on-rollout-completed.slack: backend-deployments
    notifications.argoproj.io/subscribe.on-rollout-aborted.slack: backend-deployments
spec:
  replicas: 4
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: version-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: version-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: version-api
          image: hashicorp/http-echo:0.2.3
          args:
            - "-text=🚀 Version 1.0.0 - Initial Release"
            - "-listen=:8080"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: APP_VERSION
              value: "1.0.0"
            - name: ENVIRONMENT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 10
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: version-api
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: version-api
                topologyKey: kubernetes.io/hostname

  # ==========================================================================
  # CANARY DEPLOYMENT STRATEGY
  # ==========================================================================
  strategy:
    canary:
      # Traffic steps - gradual rollout
      steps:
        - setWeight: 20
        - pause: {duration: 30s}
        - setWeight: 40
        - pause: {duration: 30s}
        - setWeight: 60
        - pause: {duration: 30s}
        - setWeight: 80
        - pause: {duration: 30s}

      # Anti-affinity for canary pods
      antiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          weight: 100

      maxUnavailable: 0
      maxSurge: "25%"
